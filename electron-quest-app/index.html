<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Forge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="app">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <!-- Scroll body -->
          <rect x="5" y="4" width="14" height="17" rx="2"/>
          <!-- Left curl top -->
          <path d="M5 4 C5 2 3 2 3 4 L3 6 C3 8 5 8 5 6"/>
          <!-- Left curl bottom -->
          <path d="M5 20 C5 22 3 22 3 20 L3 18 C3 16 5 16 5 18"/>
          <!-- Text lines -->
          <line x1="8" y1="10" x2="16" y2="10"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 style="display:flex;align-items:center;gap:7px;">
          Quest Forge
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff8c44" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.85">
            <!-- Hammer head -->
            <rect x="7" y="2" width="7" height="4" rx="1"/>
            <!-- Hammer handle -->
            <line x1="10.5" y1="6" x2="10.5" y2="11"/>
            <!-- Anvil body -->
            <path d="M6 18V13h12v5"/>
            <!-- Anvil top plate -->
            <path d="M3 18h18v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2z"/>
            <!-- Anvil horn -->
            <path d="M18 13l3-2"/>
          </svg>
        </h1>
        <p class="subtitle">Post a quest to Quest Hall</p>
      </div>
      <div class="header-actions" style="display:flex;align-items:center;gap:8px">
        <span id="connection-dot" class="connection-dot" title="Server connection"></span>
        <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Tab bar -->
    <div class="tabs">
      <button class="tab active" data-tab="quest">Post Quest</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <!-- Quest tab -->
    <div id="tab-quest" class="tab-content">
      <form id="quest-form">
        <div class="field">
          <label for="title">Quest Title</label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Analyze Q1 sales data"
            maxlength="120"
            required
          />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea
            id="description"
            placeholder="What needs to be done and why…"
            rows="3"
            maxlength="1000"
          ></textarea>
        </div>

        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="field">
          <label>Categories <span class="optional">(optional, multi-select)</span></label>
          <div class="categories-grid">
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Coding" />
              <span>Coding</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Research" />
              <span>Research</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Content" />
              <span>Content</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Sales" />
              <span>Sales</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Infrastructure" />
              <span>Infrastructure</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Bug Fix" />
              <span>Bug Fix</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Feature" />
              <span>Feature</span>
            </label>
          </div>
        </div>

        <label class="human-input-row">
          <input type="checkbox" id="human-input" />
          <span class="human-input-label">
            <span class="human-icon">👤</span>
            Human Input Required (needs Leon)
          </span>
        </label>

        <button type="submit" id="submit-btn">Post Quest</button>
      </form>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-content hidden">
      <div class="settings-section">
        <h3 class="settings-title">Connection</h3>
        <div class="field">
          <label for="cfg-server">Server URL</label>
          <input
            type="text"
            id="cfg-server"
            placeholder="http://187.77.139.247:3001"
          />
        </div>
        <div class="field">
          <label for="cfg-apikey">API Key</label>
          <input
            type="password"
            id="cfg-apikey"
            placeholder="Enter your API key"
          />
        </div>
        <button id="save-settings-btn" class="btn-primary">Save Settings</button>
      </div>

      <div class="settings-section about-section">
        <h3 class="settings-title">About</h3>
        <div class="about-row">
          <span class="about-label">App Version</span>
          <span class="about-value" id="app-version">—</span>
        </div>
        <div class="about-row">
          <span class="about-label">Dashboard Version</span>
          <span class="about-value" id="dashboard-version">—</span>
        </div>
        <div class="about-row">
          <span class="about-label">Server</span>
          <span class="about-value" id="about-server" style="font-size:10px">—</span>
        </div>
        <button id="check-update-btn" class="btn-secondary" style="margin-top:6px">Check for Updates</button>
        <div id="update-message" class="update-msg"></div>
        <div id="update-progress" style="display:none;margin-top:6px">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span class="progress-label"></span>
        </div>
      </div>
    </div>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
