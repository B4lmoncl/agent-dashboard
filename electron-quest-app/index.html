<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Forge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">OC</div>
      <div class="header-text">
        <h1>Quest Forge</h1>
        <p class="subtitle">Post a quest to Quest Hall</p>
      </div>
      <div class="header-actions" style="display:flex;align-items:center;gap:8px">
        <span id="connection-dot" class="connection-dot" title="Server connection"></span>
        <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Tab bar -->
    <div class="tabs">
      <button class="tab active" data-tab="quest">Post Quest</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <!-- Quest tab -->
    <div id="tab-quest" class="tab-content">
      <form id="quest-form">
        <div class="field">
          <label for="title">Quest Title</label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Analyze Q1 sales data"
            maxlength="120"
            required
          />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea
            id="description"
            placeholder="What needs to be done and why…"
            rows="3"
            maxlength="1000"
          ></textarea>
        </div>

        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="field">
          <label>Categories <span class="optional">(optional, multi-select)</span></label>
          <div class="categories-grid">
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Coding" />
              <span>Coding</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Research" />
              <span>Research</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Content" />
              <span>Content</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Sales" />
              <span>Sales</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Infrastructure" />
              <span>Infrastructure</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Bug Fix" />
              <span>Bug Fix</span>
            </label>
            <label class="category-option">
              <input type="checkbox" class="category-cb" value="Feature" />
              <span>Feature</span>
            </label>
          </div>
        </div>

        <label class="human-input-row">
          <input type="checkbox" id="human-input" />
          <span class="human-input-label">
            <span class="human-icon">👤</span>
            Human Input Required (needs Leon)
          </span>
        </label>

        <button type="submit" id="submit-btn">Post Quest</button>
      </form>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-content hidden">
      <div class="settings-section">
        <h3 class="settings-title">Connection</h3>
        <div class="field">
          <label for="cfg-server">Server URL</label>
          <input
            type="text"
            id="cfg-server"
            placeholder="http://187.77.139.247:3001"
          />
        </div>
        <div class="field">
          <label for="cfg-apikey">API Key</label>
          <input
            type="password"
            id="cfg-apikey"
            placeholder="Enter your API key"
          />
        </div>
        <button id="save-settings-btn" class="btn-primary">Save Settings</button>
      </div>

      <div class="settings-section about-section">
        <h3 class="settings-title">About</h3>
        <div class="about-row">
          <span class="about-label">App Version</span>
          <span class="about-value" id="app-version">—</span>
        </div>
        <div class="about-row">
          <span class="about-label">Dashboard Version</span>
          <span class="about-value" id="dashboard-version">—</span>
        </div>
        <div class="about-row">
          <span class="about-label">Server</span>
          <span class="about-value" id="about-server" style="font-size:10px">—</span>
        </div>
        <button id="check-update-btn" class="btn-secondary" style="margin-top:6px">Check for Updates</button>
        <div id="update-message" class="update-msg"></div>
      </div>
    </div>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
